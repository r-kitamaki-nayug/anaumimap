<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="robots" content="noindex,nofollow">
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta name="theme-color" content="#00afcc">
    <meta http-equiv="refresh" content="0; url=https://outatime-map.pages.dev/">
    <title>Redirecting...</title>
    <link rel="canonical" href="https://outatime-map.pages.dev/">
    <style>
        :root {
            color-scheme: light;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            box-sizing: border-box;
            background: #f7fbfc;
            color: #16363c;
        }

        main {
            width: min(100%, 420px);
            padding: 24px 20px;
            border-radius: 18px;
            background: #ffffff;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        h1 {
            margin: 0 0 10px;
            font-size: 20px;
            line-height: 1.4;
        }

        p {
            margin: 0;
            font-size: 14px;
            line-height: 1.7;
        }

        a {
            color: #00afcc;
            font-weight: 700;
            word-break: break-all;
        }
    </style>
    <script>
        (() => {
            const redirectUrl = 'https://outatime-map.pages.dev/';
            window.location.replace(redirectUrl);
        })();
    </script>
</head>
<body>
    <main>
        <h1>サイトを移転しました</h1>
        <p>
            自動で新しいURLへ移動します。移動しない場合は
            <a href="https://outatime-map.pages.dev/">https://outatime-map.pages.dev/</a>
            を開いてください。
        </p>
    </main>
</body>
</html>
