<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>岡山-昔MAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css?v=1.0.4" />
</head>
<body>
    <div id="map"></div>

    <header id="app-header">
        <button id="app-header-toggle" type="button" aria-label="タイトルバーを開閉" aria-expanded="true">
            <img class="app-header-logo" src="img/logo.png" alt="NAYUG.labo ロゴ" />
            <span class="app-header-copy">
                <span class="app-header-title">岡山の歴史を重ねて見るMAP</span>
                <span class="app-header-subtitle">by <a href="https://nayug.jp" target="_blank">NAYUG.Labo</a></span>
            </span>
        </button>
    </header>

    <div id="controls">
        <button id="gps-button" type="button" aria-label="現在地を表示">
            <span class="gps-icon" aria-hidden="true"></span>
        </button>
    </div>

    <div id="layer-panel" class="collapsed">
        <div class="layer-panel-inner">
            <button id="layer-panel-toggle" type="button" aria-label="レイヤーメニューを開閉" aria-expanded="false" aria-controls="layer-panel-content">
                <span class="layer-panel-grip" aria-hidden="true"></span>
                <span class="layer-panel-icon" aria-hidden="true"></span>
            </button>
            <div id="layer-panel-summary" aria-live="polite"></div>
            <div id="layer-panel-content" class="hidden">
                <h3>地図レイヤー</h3>
                <div id="layer-list">
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/map-engine.js?v=1.0.6"></script>
</body>
</html>
