<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="昔の岡山市は海(吉備の穴海)でした！現代の地図に古地図や航空写真を重ね、年代ごとの岡山の地形や街の変化を透明度を変えながら比較できる歴史地図MAPです。" />
    <meta name="robots" content="index,follow" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="theme-color" content="#00afcc" />
    <meta name="author" content="NAYUG.Labo" />
    <meta name="application-name" content="岡山の歴史を重ねて見るMAP" />

    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ja_JP" />
    <meta property="og:site_name" content="岡山の歴史を重ねて見るMAP" />
    <meta property="og:title" content="岡山の歴史を重ねて見るMAP" />
    <meta property="og:description" content="昔の岡山市は海(吉備の穴海)でした！現代の地図に古地図や航空写真を重ね、年代ごとの岡山の地形や街の変化を透明度を変えながら比較できる歴史地図MAPです。" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="岡山の歴史を重ねて見るMAP" />
    <meta name="twitter:description" content="昔の岡山市は海(吉備の穴海)でした！現代の地図に古地図や航空写真を重ね、年代ごとの岡山の地形や街の変化を透明度を変えながら比較できる歴史地図MAPです。" />

    <title>岡山の歴史を重ねて見るMAP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css?v=1.1.9" />
</head>
<body>
    <div id="map"></div>

    <header id="app-header">
        <button id="app-header-toggle" type="button" aria-label="タイトルバーを開閉" aria-expanded="true">
            <img class="app-header-logo" src="img/logo.png" alt="NAYUG.labo ロゴ" />
            <span class="app-header-copy">
                <span class="app-header-title">岡山の歴史を重ねて見るMAP</span>
                <span class="app-header-subtitle">by <a href="https://nayug.jp" target="_blank">NAYUG.Labo</a></span>
            </span>
        </button>
    </header>

    <div id="controls">
        <button id="gps-button" type="button" aria-label="現在地を表示">
            <span class="gps-icon" aria-hidden="true"></span>
        </button>
    </div>

    <div id="layer-panel" class="collapsed">
        <div class="layer-panel-inner">
            <button id="layer-panel-toggle" type="button" aria-label="レイヤーメニューを開閉" aria-expanded="false" aria-controls="layer-panel-content">
                <span class="layer-panel-grip" aria-hidden="true"></span>
                <span class="layer-panel-icon" aria-hidden="true"></span>
            </button>
            <div id="layer-panel-summary" aria-live="polite"></div>
            <div id="layer-panel-content" class="hidden">
                <div class="layer-panel-heading">
                    <div class="layer-panel-heading-main">
                        <h3>レイヤー</h3>
                        <div id="layer-tabs" role="tablist" aria-label="レイヤーカテゴリ"></div>
                    </div>
                    <label class="layer-select-all">
                        <input id="layer-select-all" type="checkbox" aria-label="すべてのレイヤーをまとめて切り替え">
                        <span>ALL</span>
                    </label>
                </div>
                <div id="layer-list" role="tabpanel" aria-live="polite">
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="js/map-engine.js?v=1.1.6"></script>
</body>
</html>
